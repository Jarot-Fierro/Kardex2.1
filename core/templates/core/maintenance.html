<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Mantenimiento</title>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Source Sans Pro', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .maintenance-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .icon {
            font-size: 80px;
            color: #ffc107;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            font-size: 18px;
            color: #6c757d;
            line-height: 1.6;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #adb5bd;
        }
    </style>
</head>
<body>
<div class="maintenance-container">
    <div class="icon">
        <i class="fas fa-tools"></i>
    </div>
    <h1>Estamos en mantenimiento</h1>
    <p>Disculpa las molestias. Estamos realizando algunas mejoras en el sistema para brindarte un mejor servicio. Por
        favor, vuelve a intentarlo en unos minutos.</p>
    <a href="{% url 'dashboard' %}">Volver al Inicio</a>
    <div class="footer">
        &copy; 2026 Kardex 2.1 - Departamento de Informática
    </div>
</div>
</body>
</html>
