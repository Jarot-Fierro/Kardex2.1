<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas 66x25</title>
    <style>
        @page {
            size: letter;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        /* BOTÓN */
        .no-print {
            padding: 10px 0;
            background-color: #f0f0f0;
            border-bottom: 1px solid #ccc;
        }

        .btn {
            display: inline-block;
            font-weight: 400;
            color: #fff;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            background-color: #007bff;
            border: 1px solid #007bff;
            padding: .25rem .5rem;
            font-size: .875rem;
            line-height: 1.5;
            border-radius: .2rem;
            text-decoration: none;
        }

        .text-center {
            text-align: center;
        }

        .page {
            width: 215.9mm;
            height: 279.4mm;
            margin: 0 auto;
            background-color: white;
            box-sizing: border-box;
            padding: 14mm 5mm 0 5mm; /* 1.5cm arriba */
            display: grid;
            grid-template-columns: repeat(3, 66mm);
            grid-template-rows: repeat(10, 25mm);
            gap: 0mm 2mm;
            justify-content: center;
        }

        .sticker {
            width: 66mm;
            height: 25mm;
            border: 0.1mm dashed #ccc;
            box-sizing: border-box;
            padding: 1.5mm 1mm 0.5mm 1mm; /* 🔹 Bajamos el padding inferior a 0 para que el código quede apegado */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 🔹 Arriba, no al centro */
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .nombre {
            font-size: 8pt;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 0.2mm;
            width: 100%;
        }

        .info {
            font-size: 6.5pt;
            line-height: 1;
            margin-bottom: 0.2mm;
            width: 100%;
        }

        .ficha {
            font-size: 8pt;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.2mm;
            width: 100%;
        }

        .rut {
            font-size: 8pt;
            line-height: 1;
            margin-bottom: 0.5mm;
            width: 100%;
        }

        .barcode-container {
            height: 4mm; /* 🔹 Aumentamos un poco más para que sea dominante */
            width: 40%;
            display: flex;
            align-items: stretch;
            justify-content: center;
            overflow: hidden;
            margin-top: 0.2mm;
        }

        .barcode {
            height: 100%;
            width: 100%; /* 🔹 Que se estire a lo largo */
            object-fit: fill; /* 🔹 Forzar a que ocupe all el espacio sin deformar tanto si es posible, o fill si queremos estirar */
            display: block;
        }

        @media print {
            body {
                background-color: white;
            }

            .no-print {
                display: none !important;
            }

            .page {
                margin: 0;
                border: none;
                padding: 14mm 5mm 0 5mm; /* 15mm superior para calce */
            }

            .sticker {
                border: 0.1mm solid transparent;
            }
        }
    </style>
</head>
<body>
<!-- BOTÓN -->
<div class="text-center no-print">
    <button onclick="window.print()" class="btn">
        Guardar como PDF / Imprimir
    </button>
</div>

<div class="page">
    {% for i in sticker_range %}
        <div class="sticker">
            <div class="nombre">{{ nombre_corto }}</div>
            <div class="info">Nac: {{ paciente.fecha_nacimiento|date:"d/m/Y" }} {% if paciente.comuna %}-
                {{ paciente.comuna.nombre }}{% endif %}</div>
            <div class="ficha">FICHA {{ ficha.numero_ficha|stringformat:"04d" }}</div>
            <div class="rut">{{ paciente.rut|default:"SIN RUT" }}</div>
            <div class="barcode-container">
                <img class="barcode" src="{{ codigo_barras_base64 }}" alt="barcode">
            </div>
        </div>
    {% endfor %}
</div>
</body>
<script>
    window.onload = function() {
        window.print();
        // window.onafterprint = function() { window.close(); };
    }
</script>
</html>
